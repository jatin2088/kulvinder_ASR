<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Muharani Child Assistance</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #20242a;
      --muted: #667085;
      --line: #d9e0ea;
      --paper: #f8fafc;
      --panel: #ffffff;
      --accent: #08756f;
      --accent-dark: #075a55;
      --record: #b3261e;
      --ready: #245f45;
      --warn: #9a4b12;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--paper);
      color: var(--ink);
    }
    main {
      width: min(760px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 14px;
      display: grid;
      gap: 12px;
      align-content: start;
    }
    h1 {
      margin: 8px 2px 2px;
      font-size: clamp(25px, 7vw, 38px);
      font-weight: 850;
      letter-spacing: 0;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .record-panel {
      display: grid;
      gap: 12px;
    }
    .speak-button {
      min-height: 92px;
      border: 0;
      border-radius: 8px;
      background: var(--ready);
      color: #fff;
      font-size: clamp(22px, 7vw, 34px);
      font-weight: 850;
      cursor: pointer;
      touch-action: manipulation;
    }
    .speak-button.recording { background: var(--record); }
    .speak-button:disabled { opacity: 0.65; cursor: wait; }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .actions button {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #eef4f5;
      color: var(--ink);
      font-weight: 700;
      font-size: 15px;
    }
    .level {
      height: 16px;
      background: #e8edf4;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
    }
    .level > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0f7c80, #d28a18);
      transition: width 60ms linear;
    }
    .status {
      color: var(--muted);
      min-height: 22px;
      font-size: 15px;
    }
    .result {
      min-height: 250px;
      display: grid;
      place-items: center;
      text-align: center;
      gap: 10px;
    }
    .word {
      font-size: clamp(62px, 22vw, 124px);
      line-height: 1;
      font-weight: 900;
      color: var(--accent-dark);
      word-break: keep-all;
    }
    .repeat {
      color: var(--warn);
      font-size: clamp(28px, 8vw, 48px);
      font-weight: 850;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      color: var(--muted);
      font-size: 15px;
    }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      background: #f5f8fb;
    }
    audio { width: min(100%, 430px); }
    .history-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 10px 0;
      border-top: 1px solid var(--line);
      font-size: 15px;
    }
    .history-row:first-child { border-top: 0; }
    .alternatives {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }
    @media (max-width: 560px) {
      main { padding: 10px; }
      section { padding: 12px; }
      .actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Muharani Child Assistance</h1>

    <section class="record-panel">
      <button id="speakButton" class="speak-button">Start Speaking</button>
      <div class="level" aria-label="Microphone level"><div id="levelFill"></div></div>
      <div class="actions">
        <button id="noiseButton">Calibrate Room Noise</button>
        <button id="replayButton">Replay Correct Sound</button>
      </div>
      <div id="status" class="status">Tap Start Speaking, say one word, then tap Stop & Correct.</div>
    </section>

    <section class="result">
      <div id="word" class="word">---</div>
      <div class="meta">
        <span id="confidence" class="pill">Confidence: --</span>
        <span id="quality" class="pill">Pronunciation: --</span>
      </div>
      <div id="alternatives" class="alternatives"></div>
      <audio id="referenceAudio" controls></audio>
    </section>

    <section>
      <div id="history"></div>
    </section>
  </main>

  <script>
    const speakButton = document.getElementById("speakButton");
    const noiseButton = document.getElementById("noiseButton");
    const replayButton = document.getElementById("replayButton");
    const levelFill = document.getElementById("levelFill");
    const statusEl = document.getElementById("status");
    const wordEl = document.getElementById("word");
    const confidenceEl = document.getElementById("confidence");
    const qualityEl = document.getElementById("quality");
    const alternativesEl = document.getElementById("alternatives");
    const audioEl = document.getElementById("referenceAudio");
    const historyEl = document.getElementById("history");

    let audioContext = null;
    let stream = null;
    let source = null;
    let processor = null;
    let recording = false;
    let busy = false;
    let chunks = [];
    let startedAt = 0;
    let latestLevel = 0;
    let noiseFloor = 0.012;
    let calibration = null;
    let lastAccepted = null;

    function setStatus(text) { statusEl.textContent = text; }

    async function ensureMic() {
      if (audioContext && stream) return;
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("Microphone is not available in this browser.");
      }
      stream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
          channelCount: 1
        }
      });
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      source = audioContext.createMediaStreamSource(stream);
      processor = audioContext.createScriptProcessor(2048, 1, 1);
      processor.onaudioprocess = onAudioProcess;
      source.connect(processor);
      processor.connect(audioContext.destination);
    }

    function rms(samples) {
      let sum = 0;
      for (let i = 0; i < samples.length; i++) sum += samples[i] * samples[i];
      return Math.sqrt(sum / Math.max(1, samples.length));
    }

    function onAudioProcess(event) {
      const input = event.inputBuffer.getChannelData(0);
      const copy = new Float32Array(input);
      latestLevel = rms(copy);
      const scale = Math.max(noiseFloor * 6, 0.02);
      levelFill.style.width = `${Math.min(100, latestLevel / scale * 100)}%`;

      if (calibration) calibration.levels.push(latestLevel);
      if (recording) {
        chunks.push(copy);
        if (performance.now() - startedAt > 5000) stopRecording();
      }
    }

    function mergeChunks(parts) {
      const total = parts.reduce((sum, part) => sum + part.length, 0);
      const merged = new Float32Array(total);
      let offset = 0;
      for (const part of parts) {
        merged.set(part, offset);
        offset += part.length;
      }
      return merged;
    }

    function downsample(buffer, sourceRate, targetRate) {
      if (sourceRate === targetRate) return buffer;
      const ratio = sourceRate / targetRate;
      const length = Math.max(1, Math.round(buffer.length / ratio));
      const result = new Float32Array(length);
      for (let i = 0; i < length; i++) {
        const start = Math.floor(i * ratio);
        const end = Math.min(buffer.length, Math.floor((i + 1) * ratio));
        let sum = 0;
        for (let j = start; j < end; j++) sum += buffer[j];
        result[i] = sum / Math.max(1, end - start);
      }
      return result;
    }

    function encodeWav(samples, sourceRate, targetRate) {
      const pcm = downsample(samples, sourceRate, targetRate);
      const buffer = new ArrayBuffer(44 + pcm.length * 2);
      const view = new DataView(buffer);
      writeString(view, 0, "RIFF");
      view.setUint32(4, 36 + pcm.length * 2, true);
      writeString(view, 8, "WAVE");
      writeString(view, 12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true);
      view.setUint32(24, targetRate, true);
      view.setUint32(28, targetRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, "data");
      view.setUint32(40, pcm.length * 2, true);
      let offset = 44;
      for (let i = 0; i < pcm.length; i++, offset += 2) {
        const sample = Math.max(-1, Math.min(1, pcm[i]));
        view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7fff, true);
      }
      return { blob: new Blob([view], { type: "audio/wav" }), duration: pcm.length / targetRate, rms: rms(pcm) };
    }

    function writeString(view, offset, text) {
      for (let i = 0; i < text.length; i++) view.setUint8(offset + i, text.charCodeAt(i));
    }

    async function startRecording() {
      await ensureMic();
      await audioContext.resume();
      chunks = [];
      recording = true;
      startedAt = performance.now();
      speakButton.textContent = "Stop & Correct";
      speakButton.classList.add("recording");
      setStatus("Recording...");
    }

    async function stopRecording() {
      if (!recording || busy) return;
      recording = false;
      busy = true;
      speakButton.disabled = true;
      speakButton.textContent = "Correcting...";
      speakButton.classList.remove("recording");
      setStatus("Processing recording...");

      const encoded = encodeWav(mergeChunks(chunks), audioContext.sampleRate, 16000);
      chunks = [];

      if (encoded.duration < 0.25 || encoded.rms < 0.002) {
        resetButton();
        showRepeat("Recording was too short or quiet. Please speak closer and try again.");
        return;
      }

      try {
        const form = new FormData();
        form.append("audio", encoded.blob, "speech.wav");
        form.append("duration", encoded.duration.toFixed(4));
        form.append("rms", encoded.rms.toFixed(6));
        form.append("noise_floor", noiseFloor.toFixed(6));
        const response = await fetch("/predict", { method: "POST", body: form });
        const result = await response.json();
        if (!response.ok) throw new Error(result.error || "Prediction failed");
        showResult(result);
      } catch (error) {
        showRepeat(error.message);
      } finally {
        resetButton();
      }
    }

    function resetButton() {
      busy = false;
      speakButton.disabled = false;
      speakButton.textContent = "Start Speaking";
      speakButton.classList.remove("recording");
    }

    function showRepeat(message) {
      wordEl.textContent = "Please repeat";
      wordEl.classList.add("repeat");
      confidenceEl.textContent = "Confidence: --";
      qualityEl.textContent = "Pronunciation: --";
      alternativesEl.textContent = "";
      setStatus(message);
    }

    function showResult(result) {
      if (!result.accepted) {
        showRepeat("Low confidence. Please repeat the word clearly.");
        addHistory("Repeat needed", `${(result.confidence * 100).toFixed(1)}%`);
        return;
      }

      lastAccepted = result;
      wordEl.classList.remove("repeat");
      wordEl.textContent = result.word;
      confidenceEl.textContent = `Confidence: ${(result.confidence * 100).toFixed(1)}%`;
      qualityEl.textContent = `Pronunciation: ${result.quality_label}`;
      alternativesEl.textContent = (result.alternatives || [])
        .map((item, index) => `${index + 1}. ${item.word} ${(item.confidence * 100).toFixed(1)}%`)
        .join("   ");
      audioEl.src = `${result.reference_url}?t=${Date.now()}`;
      audioEl.play().catch(() => {});
      setStatus(`Saved test ${result.recording_id || ""}`.trim());
      addHistory(result.word, `${(result.confidence * 100).toFixed(1)}%`);
    }

    function addHistory(label, value) {
      const row = document.createElement("div");
      row.className = "history-row";
      row.innerHTML = `<strong>${label}</strong><span>${value}</span>`;
      historyEl.prepend(row);
    }

    speakButton.addEventListener("click", async () => {
      try {
        if (busy) return;
        if (recording) await stopRecording();
        else await startRecording();
      } catch (error) {
        resetButton();
        showRepeat(error.message);
      }
    });

    noiseButton.addEventListener("click", async () => {
      try {
        await ensureMic();
        await audioContext.resume();
        calibration = { levels: [] };
        noiseButton.disabled = true;
        setStatus("Keep quiet for 2 seconds...");
        setTimeout(() => {
          const levels = calibration ? calibration.levels : [];
          calibration = null;
          if (levels.length) {
            const sorted = [...levels].sort((a, b) => a - b);
            noiseFloor = Math.max(0.006, sorted[Math.floor(sorted.length * 0.8)]);
            setStatus("Room noise calibrated.");
          } else {
            setStatus("Could not calibrate room noise.");
          }
          noiseButton.disabled = false;
        }, 2000);
      } catch (error) {
        noiseButton.disabled = false;
        showRepeat(error.message);
      }
    });

    replayButton.addEventListener("click", () => {
      if (lastAccepted && audioEl.src) {
        audioEl.currentTime = 0;
        audioEl.play().catch(() => {});
      }
    });
  </script>
</body>
</html>
